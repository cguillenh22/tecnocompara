title: "TecnoCompara"
tagline: "Comparativas claras de celulares, TVs y refrigeradoras en Perú"
description: >-
  Guías y comparativas independientes para elegir celulares, televisores
  y refrigeradoras en Perú, sin jerga y sin relleno.
url: "https://tech.modoahorro.pe"
lang: es-PE

# --- Publicación programada ---
# Un artículo con date: en el futuro no aparece en el sitio hasta esa
# fecha (comportamiento por defecto de Jekyll, explícito aquí a
# propósito). Necesario para el calendario editorial de 2 artículos/día.
future: false
timezone: America/Lima

# --- Awin / afiliados ---
# Reemplaza cuando tengas el advertiser de Samsung aprobado en Awin.
awin_disclosure: true

# --- Medición (cuenta NUEVA, no reutilizar la de ModoAhorro) ---
gtm_container_id: "GTM-KFL8K7NL"
ga4_measurement_id: "G-BN1Y2QSG0W"

collections:
  articulos:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: ""
      type: "articulos"
    values:
      layout: "articulo"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

permalink: /:title/

plugins:
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - NOTES.md
  - README.md
  - node_modules
  - vendor

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
