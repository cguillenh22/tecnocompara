---
layout: default
title: "Buscar"
description: "Busca comparativas y guías en TecnoCompara."
permalink: /buscar/
---
<div class="container" style="padding-top:32px;">
  <section class="hero" style="padding-top:0;">
    <span class="eyebrow">Buscar</span>
    <h1>¿Qué estás buscando?</h1>
  </section>

  <input type="search" id="search-input" placeholder="Ej. samsung, refrigeradora, 4k..."
    style="width:100%; padding:14px 16px; font-size:1.1rem; border:1px solid var(--color-line-strong); border-radius:6px; font-family:var(--font-body); margin-bottom:24px;"
    autofocus>

  <div id="search-results" class="card-grid"></div>
  <p id="search-empty" style="display:none; color:var(--color-ink-soft);">
    No encontramos artículos con ese término. Intenta con otra palabra.
  </p>
</div>

<script>
(function() {
  var input = document.getElementById('search-input');
  var resultsEl = document.getElementById('search-results');
  var emptyEl = document.getElementById('search-empty');
  var data = [];

  fetch('{{ "/search.json" | relative_url }}')
    .then(function(res) { return res.json(); })
    .then(function(json) { data = json; });

  function render(items) {
    resultsEl.innerHTML = '';
    if (items.length === 0) {
      emptyEl.style.display = 'block';
      return;
    }
    emptyEl.style.display = 'none';
    items.forEach(function(item) {
      var card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<h3><a href="' + item.url + '">' + item.title + '</a></h3>' +
        '<div class="meta">' + (item.category || '') + '</div>';
      resultsEl.appendChild(card);
    });
  }

  input.addEventListener('input', function() {
    var q = input.value.trim().toLowerCase();
    if (q.length < 2) {
      resultsEl.innerHTML = '';
      emptyEl.style.display = 'none';
      return;
    }
    var matches = data.filter(function(item) {
      return (item.title && item.title.toLowerCase().indexOf(q) !== -1) ||
             (item.description && item.description.toLowerCase().indexOf(q) !== -1) ||
             (item.category && item.category.toLowerCase().indexOf(q) !== -1);
    });
    render(matches);
  });
})();
</script>
